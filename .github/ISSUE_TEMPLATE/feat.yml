name: New agent, skill, or prompting change
description: >-
  Request something new in the catalog — an agent, a skill, or a prompting
  change to an existing agent. The triage agent will label it
  and comment with a suggested plan.
title: "feat: "
body:
  - type: dropdown
    id: kind
    attributes:
      label: What kind of addition is this?
      options:
        - New agent
        - Skill for an existing agent
        - Prompting change to an existing agent
    validations:
      required: true
  - type: input
    id: target
    attributes:
      label: Target agent
      description: >-
        For a skill or prompting change: which agent under `agents/` selects
        it. For a new agent: the proposed agent id.
      placeholder: e.g. actions-agent, or technical-writer (proposed)
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What should it do?
      description: >-
        The mode of work or capability, in a few sentences. One mode of work
        per agent; one focused capability per skill.
    validations:
      required: true
  - type: textarea
    id: harnesses
    attributes:
      label: Harnesses
      description: Which harnesses this targets (Pi, Claude Code) and anything harness-specific.
      placeholder: Pi primarily; Claude Code if possible
    validations:
      required: false
