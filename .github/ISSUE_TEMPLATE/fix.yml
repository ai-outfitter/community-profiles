name: Something is broken
description: >-
  An existing agent, skill, or catalog file is broken, wrong, or out of
  date. The triage agent will label it and comment with a suggested plan.
title: "fix: "
body:
  - type: input
    id: target
    attributes:
      label: Affected agent or file
      description: The agent id or protocol-resource path that is broken.
      placeholder: e.g. actions-agent, or skills/issue-triage/SKILL.md
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What should happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: What happens instead?
      description: >-
        Include the command you ran (e.g. `outfitter run <agent-id>`) and
        any error output.
    validations:
      required: true
